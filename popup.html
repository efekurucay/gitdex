<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub to NotebookLM</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="icons/icon48.png" alt="Logo" class="logo" />
      <h1>GitHub to NotebookLM</h1>
    </div>

    <div class="input-group">
      <label for="repoUrl">GitHub Repo URL</label>
      <input
        type="text"
        id="repoUrl"
        placeholder="https://github.com/owner/repo"
      />
    </div>

    <div class="options">
      <label>
        <input type="checkbox" id="ignoreNodeModules" checked />
        node_modules klasörünü yoksay
      </label>
      <label>
        <input type="checkbox" id="ignoreDotGit" checked />
        .git klasörünü yoksay
      </label>
      <label>
        <input type="checkbox" id="ignoreBinaryFiles" checked />
        Binary dosyaları yoksay
      </label>
      <label>
        <input type="checkbox" id="autoImportNotebookLM" />
        Islem bitince NotebookLM'e aktarmayi dene (sekme + dosya yukleme)
      </label>
    </div>

    <div class="github-token-group">
      <label for="githubToken">GitHub Token (Opsiyonel - private repo veya rate limit için)</label>
      <input
        type="password"
        id="githubToken"
        placeholder="ghp_xxxxxxxxxxxx"
      />
      <p class="helper-text">Token yalnizca bu tarayici oturumu boyunca saklanir.</p>
    </div>

    <button id="startBtn" class="btn-primary">
      <span id="btnText">Başlat</span>
      <span id="btnSpinner" class="spinner hidden"></span>
    </button>

    <div id="progressContainer" class="progress-container hidden">
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <p id="progressText" class="progress-text">Hazırlanıyor...</p>
    </div>

    <div id="logContainer" class="log-container hidden">
      <div id="logContent" class="log-content"></div>
    </div>

    <div id="resultContainer" class="result-container hidden">
      <p id="resultText"></p>
      <div class="result-buttons">
        <button id="downloadBtn" class="btn-secondary hidden">ZIP Olarak Indir</button>
        <button id="importNotebookLMBtn" class="btn-accent hidden">NotebookLM'e Aktar</button>
        <button id="openNotebookLMBtn" class="btn-secondary hidden">NotebookLM'i Ac</button>
      </div>
    </div>
  </div>
  <script src="zip.js"></script>
  <script src="popup.js"></script>
</body>
</html>
